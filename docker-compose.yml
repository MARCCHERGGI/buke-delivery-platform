services:
  backend:
    build:
      context: ./buke-api
      dockerfile: Dockerfile
    container_name: buke-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-buke}:${POSTGRES_PASSWORD:-buke_local_dev}@database:5432/${POSTGRES_DB:-buke}
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379/0
      DISPATCH_MAX_DISTANCE_M: ${DISPATCH_MAX_DISTANCE_M:-3000}
      DISPATCH_OFFER_TTL_SECONDS: ${DISPATCH_OFFER_TTL_SECONDS:-30}
      DISPATCH_DRIVER_FRESHNESS_SECONDS: ${DISPATCH_DRIVER_FRESHNESS_SECONDS:-300}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - buke-network

  database:
    image: postgres:16-alpine
    container_name: buke-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buke}
      POSTGRES_USER: ${POSTGRES_USER:-buke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buke_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./buke-api/migrations:/migrations:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-buke} -d ${POSTGRES_DB:-buke}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - buke-network

  redis:
    image: redis:7-alpine
    container_name: buke-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buke-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: buke-frontend
    restart: unless-stopped
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:3000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - buke-network

volumes:
  postgres_data:
  redis_data:

networks:
  buke-network:
    driver: bridge
